services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: catalog
      POSTGRES_USER: catalog
      POSTGRES_PASSWORD: catalog
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog"]
      interval: 2s
      timeout: 2s
      retries: 10

  bootstrap-pgboss:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    command: ["node", "scripts/bootstrap-pgboss.js"]
    environment:
      CATALOG_DB_URL: postgres://catalog:catalog@postgres:5432/catalog
      BOOTSTRAP_PG_BOSS_SCHEMA: "true"
      PGBOSS_ALLOWED_ENV: local
      CATALOG_DB_ENVIRONMENT: local
      CATALOG_DB_ROLE: buywhere_ingest_rw
      CATALOG_DB_CANONICAL: "true"
    restart: "no"

  ingest-worker:
    build: .
    depends_on:
      bootstrap-pgboss:
        condition: service_completed_successfully
    environment:
      CATALOG_DB_URL: postgres://catalog:catalog@postgres:5432/catalog
      BOOTSTRAP_PG_BOSS_SCHEMA: "false"
      PGBOSS_ALLOWED_ENV: local
      CATALOG_DB_ENVIRONMENT: local
      CATALOG_DB_ROLE: buywhere_ingest_rw
      CATALOG_DB_CANONICAL: "true"
